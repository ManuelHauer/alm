# Production docker-compose for alm project.
#
# Usage (local test):
#   cp .env.example .env && edit .env
#   docker compose up --build
#
# Usage (Coolify / Hetzner):
#   Configure env vars in Coolify UI — no .env file needed on the server.
#   Coolify uses this file as the "Docker Compose" application definition.
#
# Volumes:
#   pgdata — PostgreSQL data, persisted across restarts
#   media  — Uploaded images, mounted at /app/media inside the app container

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: alm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: alm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alm -d alm"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://alm:${POSTGRES_PASSWORD}@postgres:5432/alm
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-https://almproject.com}
      NODE_ENV: production
    volumes:
      - media:/app/media

volumes:
  pgdata:
  media:
